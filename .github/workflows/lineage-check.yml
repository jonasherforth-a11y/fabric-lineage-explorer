# GitHub Actions workflow for Fabric lineage validation
# Runs on every PR that touches the solution/ folder
# Generates lineage map, detects issues, posts summary to PR

name: Fabric Lineage Check

on:
  pull_request:
    paths:
      - 'solution/**'
  push:
    branches: [main]
    paths:
      - 'solution/**'

jobs:
  lineage-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for diff comparison

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install rich

      - name: Download baseline (if exists)
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: lineage-baseline
          path: .lineage/

      - name: Run lineage scan
        run: |
          cd poc-lineage-tracker
          python ci_lineage_check.py \
            --solution-path ../solution \
            --output ../lineage.json \
            --summary ../lineage_summary.md \
            --baseline ../.lineage/lineage.json \
            --fail-on-errors

      - name: Upload lineage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lineage-baseline
          path: lineage.json
          retention-days: 90

      - name: Upload summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lineage-summary
          path: lineage_summary.md

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('lineage_summary.md', 'utf8');
            
            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(c => 
              c.body.includes('# Fabric Lineage Scan Report')
            );
            
            const body = summary + '\n\n---\n*Generated by Fabric Lineage CI*';
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }
